name: Clippy All Combinations

on:
  push:
    branches: [main]
  pull_request:

jobs:
  clippy:
    name: clippy (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: x86_64-apple-darwin
            args: --all-features
          - os: macos-latest
            target: aarch64-apple-darwin
            args: --all-features
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            args: --all-features
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            args: --features on_off_widgets
          - os: ubuntu-latest
            target: wasm32-unknown-unknown
            args: --all-features

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          target: ${{ matrix.target }}

      - name: Install wasm target
        if: matrix.target == 'wasm32-unknown-unknown'
        run: rustup target add wasm32-unknown-unknown

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-target-${{ matrix.target }}-
            ${{ runner.os }}-cargo-build-

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - name: Run clippy
        if: matrix.target != 'wasm32-unknown-unknown'
        run: cargo clippy --target ${{ matrix.target }} ${{ matrix.args }} -- -D warnings

      - name: Run clippy (wasm32)
        if: matrix.target == 'wasm32-unknown-unknown'
        run: cargo clippy --target ${{ matrix.target }} --workspace --exclude tui --exclude midi-bpm-detector-plugin --exclude xtask --exclude ci ${{ matrix.args }} -- -D warnings
